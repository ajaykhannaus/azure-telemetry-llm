# Runner Container App with ACR admin registry auth (sandbox).
location: __LOCATION__
properties:
  managedEnvironmentId: __MANAGED_ENV_ID__
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: true
      targetPort: 8000
      transport: auto
      allowInsecure: false
      additionalPortMappings:
        - targetPort: 8080
          exposedPort: 8080
          external: false
    registries:
      - server: __ACR_LOGIN_SERVER__
        username: __ACR_USERNAME__
        passwordSecretRef: acr-admin-password
    secrets:
      - name: eventhub-namespace
        value: __EVENTHUB_NAMESPACE__
      - name: eventhub-connection-string
        value: __EVENTHUB_CONNECTION_STRING__
      - name: acr-admin-password
        value: __ACR_ADMIN_PASSWORD__
  template:
    containers:
      - name: ai-telemetry-runner-dev
        image: __IMAGE__
        resources:
          cpu: 0.5
          memory: 1Gi
        env:
          - name: ENVIRONMENT
            value: dev
          - name: OTEL_SERVICE_NAME
            value: ai-telemetry-dev
          - name: OBS_APP_ID
            value: ai-telemetry-dev
          - name: PROMETHEUS_PORT
            value: "8000"
          - name: HEALTH_PORT
            value: "8080"
          - name: EVENTHUB_NAMESPACE
            secretRef: eventhub-namespace
          - name: EVENTHUB_CONNECTION_STRING
            secretRef: eventhub-connection-string
          - name: EVENTHUB_NAME
            value: __EVENTHUB_NAME__
          - name: ALLOW_MOCK_MODE
            value: "true"
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: __OTEL_ENDPOINT__
          - name: OTEL_EXPORTER_OTLP_INSECURE
            value: "true"
        probes:
          - type: Liveness
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          - type: Readiness
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          - type: Startup
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30
    scale:
      minReplicas: 2
      maxReplicas: 4
identity:
  type: SystemAssigned
