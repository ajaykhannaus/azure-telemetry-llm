# Tempo Container App — config baked into ACR image (sandbox / no AcrPull MI).
location: __LOCATION__
properties:
  managedEnvironmentId: __MANAGED_ENV_ID__
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: false
      targetPort: 3200
      exposedPort: 3200
      transport: http
      additionalPortMappings:
        - targetPort: 4317
          exposedPort: 4317
          external: false
    registries:
      - server: __ACR_LOGIN_SERVER__
        username: __ACR_USERNAME__
        passwordSecretRef: acr-admin-password
    secrets:
      - name: acr-admin-password
        value: __ACR_ADMIN_PASSWORD__
  template:
    containers:
      - name: tempo
        image: __IMAGE__
        args:
          - "-config.file=/etc/tempo/tempo.yaml"
        resources:
          cpu: 0.5
          memory: 1Gi
        probes:
          - type: Liveness
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
    scale:
      minReplicas: 1
      maxReplicas: 2
identity:
  type: SystemAssigned
