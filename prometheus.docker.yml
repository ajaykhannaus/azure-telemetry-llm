# Prometheus config for docker-compose local stack.
# Scrapes the runner on the host via host.docker.internal (Windows / Mac Docker Desktop).
global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    service: ai-telemetry
    environment: dev

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: ai-telemetry-runner
    static_configs:
      - targets: ["host.docker.internal:8000"]
    scheme: http
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
    scheme: http
    metrics_path: /metrics
