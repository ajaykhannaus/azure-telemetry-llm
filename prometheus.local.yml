# Local dev Prometheus — scrapes the runner on localhost:8000
global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    service: ai-telemetry
    environment: dev

rule_files:
  - rules.yml

scrape_configs:
  - job_name: ai-telemetry-runner
    static_configs:
      - targets: ["localhost:8000"]
    scheme: http
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: ["localhost:8888"]
    scheme: http
    metrics_path: /metrics
