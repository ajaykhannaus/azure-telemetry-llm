apiVersion: 1

providers:
  - name: "AI Telemetry Dashboards"
    orgId: 1
    folder: "AI Telemetry"
    folderUid: "ai-telemetry-folder"
    type: file
    disableDeletion: true
    updateIntervalSeconds: 300
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
