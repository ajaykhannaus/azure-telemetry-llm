apiVersion: 1

# URL env vars let this file work both locally (docker-compose defaults) and
# in Azure (Container App env vars set by the deploy scripts).
#   PROMETHEUS_URL  required at runtime (docker-compose / Container App env)
#   LOKI_URL        required at runtime
#   TEMPO_URL       required at runtime
# Grafana expands $VAR from the environment at startup (not ${VAR:-default} syntax).

datasources:
  - name: Prometheus
    uid: prometheus-ds
    type: prometheus
    access: proxy
    url: $PROMETHEUS_URL
    isDefault: true
    jsonData:
      timeInterval: 10s
      tlsSkipVerify: true
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo-ds
    editable: true

  - name: Loki
    uid: loki-ds
    type: loki
    access: proxy
    url: $LOKI_URL
    jsonData:
      tlsSkipVerify: true
      derivedFields:
        - datasourceUid: tempo-ds
          matcherRegex: '"trace_id":"([a-f0-9]{32})"'
          name: trace_id
          url: "$${__value.raw}"
          urlDisplayLabel: "Open in Tempo"
    editable: true

  - name: Tempo
    uid: tempo-ds
    type: tempo
    access: proxy
    url: $TEMPO_URL
    jsonData:
      tlsSkipVerify: true
      tracesToLogsV2:
        datasourceUid: loki-ds
        filterByTraceID: true
        filterBySpanID: false
        customQuery: false
      tracesToMetrics:
        datasourceUid: prometheus-ds
      serviceMap:
        datasourceUid: prometheus-ds
      lokiSearch:
        datasourceUid: loki-ds
    editable: true
