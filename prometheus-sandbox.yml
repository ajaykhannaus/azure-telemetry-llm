# Self-hosted Prometheus for sandbox (no Azure Managed Prometheus remote_write).
global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    service: ai-telemetry
    environment: dev

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: ai-telemetry-runner
    static_configs:
      - targets: ["__SCRAPE_TARGET__"]
    scheme: https
    metrics_path: /metrics
